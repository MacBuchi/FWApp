name: Security

# Schwachstellen-Scan über die Lockfiles (OSV-Datenbank).
#
# Bewusst NICHT an Pull Requests gehängt und bewusst kein Required Check:
# Eine neu veröffentlichte CVE in einer transitiven Abhängigkeit würde sonst
# jeden unbeteiligten PR rot färben, bis jemand aufräumt. Als Wochenlauf
# meldet GitHub den Fehlschlag per Mail an den Maintainer — das passt zum
# Solo-Betrieb und blockiert niemanden.
#
# Ergänzt Dependabot: Der liefert für `pub` nur Versions-, keine
# Schwachstellendaten. Diesen Teil deckt OSV ab.

on:
  schedule:
    - cron: "17 5 * * 1" # montags früh
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  # Für den SARIF-Upload nach Security → Code Scanning (im öffentlichen Repo
  # kostenlos). Die aufgerufene Workflow-Datei fordert genau diese drei an.
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan:
    # Standard-Scan-Argumente (`-r ./`) belassen: Der Scanner findet
    # pubspec.lock selbst und nimmt die Podfile.lock-Dateien gleich mit.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
