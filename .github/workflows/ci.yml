name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Guard against stale committed codegen (.g.dart / .freezed.dart).
      - name: Verify generated code is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code || {
            echo "::error::Generated files are stale. Run 'dart run build_runner build' and commit the result."
            exit 1
          }

      - name: Analyze
        run: flutter analyze

      # The Supabase sync E2E test skips itself when no local stack is running.
      - name: Test (with coverage)
        run: flutter test --coverage

      - name: Coverage gate (logic layers ≥ 65%)
        run: dart run tool/check_coverage.dart --min 65

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 14

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 14
