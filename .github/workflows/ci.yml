name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Guard against stale committed codegen (.g.dart / .freezed.dart).
      - name: Verify generated code is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code || {
            echo "::error::Generated files are stale. Run 'dart run build_runner build' and commit the result."
            exit 1
          }

      - name: Analyze
        run: flutter analyze

      # Local Supabase stack so the sync E2E test runs (it self-skips
      # without one, which would drop coverage below the gate).
      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Create sync test users
        run: bash tool/setup_local_supabase.sh

      - name: Test (with coverage)
        run: flutter test --coverage

      - name: Coverage gate (logic layers ≥ 65%)
        run: dart run tool/check_coverage.dart --min 65

      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 14

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

      - uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web
          retention-days: 14

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true

      - run: flutter pub get

      # Ein einzelnes arm64-APK reicht: deckt praktisch jedes Android-Gerät
      # ab ca. 2017 ab.
      - run: flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
