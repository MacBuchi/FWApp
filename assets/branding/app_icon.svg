<?xml version="1.0" encoding="UTF-8"?>
<!-- FWApp app icon: white flame (Material Symbols "whatshot" silhouette,
     Apache 2.0) on a fire-engine-red gradient. Full-bleed square; the
     platforms mask their own corner radius. -->
